<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="script.js" defer></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">
<h1 class="mt-4">GPA Calculator</h1>

<div id="result" class="mt-3"></div>

<form id="gpaForm" class="mt-3">

<div id="courses">

<div class="course-row form-row mb-2">

<div class="col">
<input type="text" name="course[]" class="form-control"
placeholder="Course name" required>
</div>

<div class="col-2">
<input type="number" name="credits[]" class="form-control"
placeholder="Credits" min="1" required>
</div>

<div class="col-2">
<select name="grade[]" class="form-control">
<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>
</select>
</div>

</div>
</div>

<button type="button" id="addCourse"
class="btn btn-secondary mb-3">
+ Add Course
</button>
<br>

<button type="submit" class="btn btn-primary">
Calculate GPA
</button>
<div class="form-group">
<input type="text" name="student" placeholder="Student Name" required>
</div>

<div class="form-group">
<input type="text" name="semester" placeholder="Semester" required>
<a href="export.php" class="btn btn-success">
Export CSV
</a>
</div>

</form>
</div>

</body>
</html>
